<script>
const data = [
  {gpu:"GTX 1650", x:9500, y:150},
  {gpu:"RTX 2060", x:14000, y:220},
  {gpu:"RTX 3060", x:17000, y:300},
  {gpu:"RTX 4060", x:19000, y:330},
  {gpu:"RX 6600", x:16000, y:240},
  {gpu:"RX 6700 XT", x:20000, y:350},
  {gpu:"RTX 4070", x:28000, y:600},
  {gpu:"RTX 4080", x:34000, y:1100},
  {gpu:"RTX 3090", x:26000, y:900},
  {gpu:"RTX 3050", x:12000, y:280}
];

const canvas = document.getElementById("grafica");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

const margenIzq = 90;
const margenDer = 40;
const margenSup = 50;
const margenInf = 80;

const maxX = 35000;
const maxY = 1200;

const grafW = W - margenIzq - margenDer;
const grafH = H - margenSup - margenInf;

function mapX(valor){
  return margenIzq + (valor / maxX) * grafW;
}

function mapY(valor){
  return margenSup + grafH - (valor / maxY) * grafH;
}

// Fondo
ctx.fillStyle = "#111";
ctx.fillRect(0, 0, W, H);

// Título
ctx.fillStyle = "#e5e7eb";
ctx.font = "bold 18px Segoe UI";
ctx.textAlign = "center";
ctx.fillText("Relación rendimiento / precio de tarjetas gráficas", W / 2, 28);

// Ejes
ctx.strokeStyle = "#60a5fa";
ctx.lineWidth = 2;

ctx.beginPath();
ctx.moveTo(margenIzq, margenSup);
ctx.lineTo(margenIzq, margenSup + grafH);
ctx.lineTo(margenIzq + grafW, margenSup + grafH);
ctx.stroke();

// Grid y etiquetas eje Y
ctx.font = "12px Segoe UI";
ctx.textAlign = "right";
ctx.fillStyle = "#e5e7eb";
ctx.strokeStyle = "rgba(255,255,255,0.12)";
ctx.lineWidth = 1;

for(let y = 0; y <= maxY; y += 200){
  const py = mapY(y);

  ctx.beginPath();
  ctx.moveTo(margenIzq, py);
  ctx.lineTo(margenIzq + grafW, py);
  ctx.stroke();

  ctx.fillText(y + " €", margenIzq - 10, py + 4);
}

// Grid y etiquetas eje X
ctx.textAlign = "center";

for(let x = 0; x <= maxX; x += 5000){
  const px = mapX(x);

  ctx.beginPath();
  ctx.moveTo(px, margenSup);
  ctx.lineTo(px, margenSup + grafH);
  ctx.stroke();

  ctx.fillText(x, px, margenSup + grafH + 22);
}

// Títulos de los ejes
ctx.fillStyle = "#60a5fa";
ctx.font = "bold 14px Segoe UI";
ctx.textAlign = "center";
ctx.fillText("PassMark G3D Mark (puntos)", margenIzq + grafW / 2, H - 25);

ctx.save();
ctx.translate(25, margenSup + grafH / 2);
ctx.rotate(-Math.PI / 2);
ctx.fillText("Precio (€)", 0, 0);
ctx.restore();

// Puntos
data.forEach(p => {
  const x = mapX(p.x);
  const y = mapY(p.y);

  ctx.fillStyle = "#22c55e";
  ctx.beginPath();
  ctx.arc(x, y, 6, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.fillStyle = "#ffffff";
  ctx.font = "11px Segoe UI";
  ctx.textAlign = "left";
  ctx.fillText(p.gpu, x + 8, y - 8);

  ctx.fillStyle = "#facc15";
  ctx.font = "10px Segoe UI";
  ctx.fillText(p.y + "€", x + 8, y + 6);
});
</script>
